{% extends "base/index3.html" %}
{% block content %}
{% load crispy_forms_tags %}
   
           
            
        <form  method="POST" class="needs-validation " novalidate="" enctype="multipart/form-data">
         
            {% csrf_token %}
               
            <br>
            <h4 class="mb-3 text-center">Modificar tus datos personales</h4>
            <br>
                
      
              {% comment %} {{form.as_table}} {% endcomment %}
        
            <div class="row">
                 {{form | crispy}}
            </div>        
            
            

        <div class="d-flex justify-content-end">                  
            <a type="reset" class="btn btn-secondary" href={% url 'datos_usuarios' %}>Cancelar</a>
            &nbsp;                 
            <input type="submit" class="btn btn-primary" value="Guardar">                    
        </div>
    
    </form>


           
{% endblock  %}
